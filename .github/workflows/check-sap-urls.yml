name: Check SAP Download URLs

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-urls:
    name: Check SAP URLs
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml requests

      - name: Extract and check URLs
        id: check
        run: |
          python3 .github/scripts/check_sap_urls.py \
            --sap-dir SAP \
            --exclude-dir archives \
            --output url-check-results.json \
            --timeout 15 \
            --workers 20

      - name: Generate summary
        if: always()
        run: |
          python3 - <<'EOF'
          import json, os

          with open("url-check-results.json") as f:
              results = json.load(f)

          total   = len(results)
          by_code = {}
          for r in results:
              code = r.get("status") or r.get("error", "error")
              by_code.setdefault(code, []).append(r)

          lines = ["## SAP URL Check Results\n"]
          lines.append(f"| Status | Count |")
          lines.append(f"|--------|-------|")
          for code in sorted(by_code, key=lambda x: str(x)):
              lines.append(f"| {code} | {len(by_code[code])} |")
          lines.append(f"\n**Total unique URLs checked:** {total}")

          not_found = by_code.get(404, [])
          if not_found:
              lines.append(f"\n### 404 Not Found ({len(not_found)})\n")
              for r in not_found:
                  lines.append(f"- `{r['url']}`  \n  Source: `{r['source']}`")

          errors = [r for code, rs in by_code.items() if isinstance(code, str) for r in rs]
          if errors:
              lines.append(f"\n### Connection Errors ({len(errors)})\n")
              for r in errors[:50]:   # cap at 50 to keep summary readable
                  lines.append(f"- `{r['url']}`  \n  Error: {r.get('error')} | Source: `{r['source']}`")
              if len(errors) > 50:
                  lines.append(f"\n_...and {len(errors) - 50} more. See the uploaded artifact for the full list._")

          summary = "\n".join(lines)
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as f:
              f.write(summary + "\n")

          if not_found:
              print(f"::warning::{len(not_found)} URL(s) returned 404. Check the job summary for details.")
          EOF

      - name: Upload results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: url-check-results
          path: url-check-results.json
          retention-days: 30
