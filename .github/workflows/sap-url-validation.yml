name: Validate SAP URLs

on:
  push:
    paths:
      - 'SAP/**/*.yaml'
      - 'SAP/**/*.yml'
      - '.github/workflows/sap-url-validation.yml'
  pull_request:
    paths:
      - 'SAP/**/*.yaml'
      - 'SAP/**/*.yml'
      - '.github/workflows/sap-url-validation.yml'
  workflow_dispatch:

jobs:
  validate-urls:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests

      - name: Validate URLs
        env:
          S_USERNAME: ${{ secrets.S_USERNAME }}
          S_PASSWORD: ${{ secrets.S_PASSWORD }}
        run: |
          import os
          import re
          import sys
          from concurrent.futures import ThreadPoolExecutor
          import requests
          from urllib.parse import urlparse

          sap_dir = 'SAP'
          exclude_dir = os.path.join(sap_dir, 'archives')
          username = os.environ.get('S_USERNAME')
          password = os.environ.get('S_PASSWORD')

          # Find files
          files_to_check = []
          for root, _, files in os.walk(sap_dir):
              # Skip if the current path contains the excluded directory
              if exclude_dir in root:
                  continue
              for file in files:
                  if file.endswith(('.yaml', '.yml')):
                      files_to_check.append(os.path.join(root, file))

          # Extract URLs (basic regex for standard links)
          url_pattern = re.compile(r'https?://[^\s\'"<>\[\]()]+')
          all_urls = set()
          for filepath in files_to_check:
              try:
                  with open(filepath, 'r', encoding='utf-8') as f:
                      for url in url_pattern.findall(f.read()):
                          all_urls.add(url.rstrip('.,;:!?'))
              except Exception as e:
                  print(f"Error reading {filepath}: {e}")

          if not all_urls:
              print("No URLs found in the specified path.")
              sys.exit(0)

          def check_url(url):
              try:
                  domain = urlparse(url).netloc
                  # Apply auth only to SAP domains to prevent leaking credentials
                  auth = (username, password) if 'sap.com' in domain and username and password else None

                  headers = {"User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64)"}

                  # Start with GET stream as SAP portal sometimes handles HEAD differently
                  res = requests.get(url, headers=headers, auth=auth, stream=True, timeout=15)

                  # Check content type before closing stream
                  content_type = res.headers.get('Content-Type', '').lower()
                  res.close()

                  if res.status_code >= 400:
                      return url, False, f"HTTP {res.status_code}"

                  # If a software download returns HTML, the download link is broken or authentication failed
                  if 'softwaredownloads.sap.com' in domain and 'text/html' in content_type:
                      return url, False, f"Auth Failed or Broken Link (Returned HTML)"

                  return url, True, f"HTTP {res.status_code}"
                      print(f"❌ {url} - {msg}")
                      errors.append((url, msg))
                  # Optionally suppress success prints to keep logs clean
                  # else: print(f"✅ {url} ({msg})")

          # Write summary to GitHub Actions Step Summary
          step_summary_file = os.environ.get('GITHUB_STEP_SUMMARY')

          if errors:
              print(f"\n--- VALIDATION FAILED ---")
              print(f"{len(errors)} URL(s) failed validation. See summary above or in the Actions UI.")

              if step_summary_file:
                  with open(step_summary_file, "a") as f:
                      f.write("### 🚨 SAP URL Validation Failed\n\n")
                      f.write(f"**{len(errors)}** out of {len(all_urls)} URLs are broken or unauthorized:\n\n")
                      f.write("| URL | Error |\n|---|---|\n")
                      for err_url, err_msg in errors:
                          f.write(f"| {err_url} | {err_msg} |\n")

              # Fail at the very end of the workflow step
              sys.exit(1)
          else:
              print("\n--- VALIDATION SUCCESS ---")
              print(f"All {len(all_urls)} URLs validated successfully!")

              if step_summary_file:
                  with open(step_summary_file, "a") as f:
                      f.write("### ✅ SAP URL Validation Passed\n\n")
                      f.write(f"Successfully validated all **{len(all_urls)}** URLs.\n")
        shell: python
