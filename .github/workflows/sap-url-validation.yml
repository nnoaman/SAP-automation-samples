name: Validate SAP URLs

on:
  push:
    paths:
      - 'SAP/**/*.yaml'
      - 'SAP/**/*.yml'
      - '.github/workflows/sap-url-validation.yml'
  pull_request:
    paths:
      - 'SAP/**/*.yaml'
      - 'SAP/**/*.yml'
      - '.github/workflows/sap-url-validation.yml'
  workflow_dispatch:

jobs:
  validate-urls:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests

      - name: Validate URLs
        env:
          S_USERNAME: ${{ secrets.S_USERNAME }}
          S_PASSWORD: ${{ secrets.S_PASSWORD }}
        run: |
          python3 .github/scripts/check_sap_urls.py --sap-dir SAP --exclude-dir SAP/archives --sap-user "$S_USERNAME" --sap-password "$S_PASSWORD"
